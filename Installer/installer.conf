# =============================================================================
#  安装包配置文件
#
#  格式说明：
#    · KEY=VALUE，每行一条，等号两侧空格会被自动去除
#    · 以 # 开头的行为注释，空行会被忽略
#    · 路径均相对于 Installer\ 目录填写
#
#  使用方式：
#    1. 修改本文件中的配置项
#    2. 双击 build-installer.bat 即可构建
#    · Build-Installer.ps1 和 Setup.iss 为通用引擎，无需修改
#
#  输出位置：Installer\Output\{AppName}_Setup_{Version}.exe
# =============================================================================


# -----------------------------------------------------------------------------
# 应用信息
# -----------------------------------------------------------------------------

# 软件名称：显示在安装标题、开始菜单和"程序和功能"列表中
APP_NAME=PF AutoFramework

# 发布商名称：用于开始菜单分组和注册表键名
APP_PUBLISHER=PowerFocus

# 产品主页 URL：显示在"程序和功能"中（可留空）
APP_PUBLISHER_URL=https://gitee.com/juli-intelligence/PF.AutoFramework

# 应用唯一标识 GUID：每个项目必须不同，否则 Windows 会将两个程序视为同一个
# 生成方式（在 PowerShell 中执行）：[guid]::NewGuid()
# 格式：xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx（不带花括号）
APP_ID=A3F2C1D8-7B4E-4F9A-B2E6-8D3C5F1A9E7B

# 所需 .NET 桌面运行时的主版本号（整数），例如 8 表示 .NET 8
# 安装时若未检测到对应版本，会提示用户前往官网下载
APP_DOTNET_VERSION=8

# 安装包图标文件路径（.ico），相对于 Installer\ 目录
APP_ICON=..\PF.Application.Shell\-pfico.ico


# -----------------------------------------------------------------------------
# 主程序
# -----------------------------------------------------------------------------

# 主程序可执行文件名（含 .exe 后缀），安装后快捷方式指向此文件
MAIN_EXE=PF.Application.Shell.exe

# 主程序 .csproj 文件路径，相对于 Installer\ 目录
MAIN_CSPROJ=..\PF.Application.Shell\PF.Application.Shell.csproj


# -----------------------------------------------------------------------------
# 版本号
# -----------------------------------------------------------------------------

# 版本号来源：
#   auto   = 从 MSBuild props 文件中自动读取 <Version> 标签（推荐）
#   manual = 使用下方 VERSION_VALUE 手动指定
VERSION_SOURCE=auto

# （auto 模式）包含 <Version>x.x.x</Version> 的 props 文件路径
VERSION_PROPS_FILE=..\Directory.Build.props

# （manual 模式）手动指定版本号，格式：主版本.次版本.修订号
VERSION_VALUE=1.0.0


# -----------------------------------------------------------------------------
# 构建参数
# -----------------------------------------------------------------------------

# 目标运行时标识符（RID）：
#   win-x64   = 64 位 Windows（最常用）
#   win-x86   = 32 位 Windows
#   win-arm64 = ARM64 Windows
BUILD_RID=win-x64

# 是否自包含（内嵌 .NET 运行时）：
#   false = 依赖目标机器上已安装的 .NET 运行时（安装包体积小，推荐）
#   true  = 将 .NET 运行时一起打包（安装包体积大，但无需预装 .NET）
BUILD_SELF_CONTAINED=false


# -----------------------------------------------------------------------------
# Windows 服务
# -----------------------------------------------------------------------------

# 需要随主程序一起安装的 Windows 服务数量
# 0 = 不安装任何服务
# 若有多个服务，复制下方 SERVICE1_* 的 7 行，将 1 改为 2、3……并递增此计数
SERVICE_COUNT=1

# ── 服务 1 ────────────────────────────────────────────────────────────────────

# 服务项目的 .csproj 文件路径，相对于 Installer\ 目录
SERVICE1_CSPROJ=..\PF.SecsGem.Service\PF.SecsGem.Service.csproj

# 服务可执行文件名（含 .exe 后缀）
SERVICE1_EXE=PF.SecsGem.Service.exe

# 服务文件安装到 {安装目录}\ 下的子文件夹名称
SERVICE1_SUBDIR=SecsGemService

# 服务注册名称（sc.exe 使用，不能含空格）
SERVICE1_NAME=SecsGemService

# 服务显示名称（在"服务"管理器中显示）
SERVICE1_DISPLAY_NAME=PF SecsGem Service

# 服务描述（在"服务"管理器中显示）
SERVICE1_DESCRIPTION=PF.AutoFramework SECS/GEM protocol proxy service

# 是否以单文件模式发布服务（true = 合并为单个 .exe，体积稍大但部署更简洁）
SERVICE1_SINGLE_FILE=true
